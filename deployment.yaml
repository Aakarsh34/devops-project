apiVersion: apps/v1
kind: Deployment
metadata:
  name: generic-app
  labels:
    app: generic-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: generic-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: generic-app
    spec:
      containers:
        - name: app
          image: your-dockerhub-username/generic-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_NAME
              value: generic-app
            - name: APP_ENV
              value: production
            - name: APP_VERSION
              value: latest
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
