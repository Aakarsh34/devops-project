version: "3.8"

services:
  jenkins:
    build:
      context: ./jenkins
    container_name: local-jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE}/.kube:/var/jenkins_home/.kube:ro
